name: Refresh dashboard
on:
  schedule:
    - cron: "7 * * * *"   # hourly at :07 UTC
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh data and rebuild page
        run: python3 refresh.py
      - name: Commit and push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add transfers.json index.html
          git diff --cached --quiet || git commit -m "refresh $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
